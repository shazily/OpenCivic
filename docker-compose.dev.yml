# OpenCivic — local development (5 services)
# Add Qdrant, Keycloak, Celery, APISIX, LGTM, etc. when you build those features.
name: opencivic-dev

x-api-environment: &api-environment
  DEPLOYMENT_MODE: selfhosted
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  SECRET_KEY: ${SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  AI_MODE: disabled
  DOCS_ENABLED: "true"
  DATABASE_MIGRATION_URL: postgresql+asyncpg://opencivic:${POSTGRES_PASSWORD}@postgres:5432/opencivic
  DATABASE_URL: postgresql+asyncpg://opencivic_app:${POSTGRES_PASSWORD}@postgres:5432/opencivic
  DATABASE_WRITE_URL: postgresql+asyncpg://opencivic_app:${POSTGRES_PASSWORD}@postgres:5432/opencivic
  DATABASE_READ_URL: postgresql+asyncpg://opencivic_app:${POSTGRES_PASSWORD}@postgres:5432/opencivic
  VALKEY_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/0
  QDRANT_URL: http://qdrant:6333
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: opencivic
  CORS_ORIGINS: http://127.0.0.1:${OPENCIVIC_FRONTEND_PORT:-3100},http://localhost:${OPENCIVIC_FRONTEND_PORT:-3100},http://127.0.0.1:${OPENCIVIC_GATEWAY_PORT:-8088},http://localhost:${OPENCIVIC_GATEWAY_PORT:-8088}
  DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
  DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-local-token-change-me}
  DEV_TENANT_ID: ${DEV_TENANT_ID:-00000000-0000-0000-0000-000000000001}
  DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000002}
  DEV_LICENCE_ID: ${DEV_LICENCE_ID:-00000000-0000-0000-0000-000000000003}
  DEV_STEWARD_USER_ID: ${DEV_STEWARD_USER_ID:-00000000-0000-0000-0000-000000000010}
  DEV_STEWARD_AUTH_TOKEN: ${DEV_STEWARD_AUTH_TOKEN:-dev-steward-token-change-me}
  DEV_ADMIN_USER_ID: ${DEV_ADMIN_USER_ID:-00000000-0000-0000-0000-000000000011}
  DEV_ADMIN_AUTH_TOKEN: ${DEV_ADMIN_AUTH_TOKEN:-dev-admin-token-change-me}
  DEV_DEVELOPER_USER_ID: ${DEV_DEVELOPER_USER_ID:-00000000-0000-0000-0000-000000000012}
  DEV_DEVELOPER_AUTH_TOKEN: ${DEV_DEVELOPER_AUTH_TOKEN:-dev-developer-token-change-me}
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_REALM: dev
  KEYCLOAK_CLIENT_ID: opencivic-portal
  KEYCLOAK_ENABLED: ${KEYCLOAK_ENABLED:-false}
  KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
  CELERY_BROKER_URL: redis://:${VALKEY_PASSWORD}@valkey:6379/0
  CELERY_RESULT_BACKEND: redis://:${VALKEY_PASSWORD}@valkey:6379/0
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"
  CLAMAV_ENABLED: ${CLAMAV_ENABLED:-true}
  UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-52428800}
  ALLOWED_UPLOAD_EXTENSIONS: csv,tsv,json,jsonl,xlsx,parquet,pdf
  SCIM_WEBHOOK_SECRET: ${SCIM_WEBHOOK_SECRET:-dev-scim-secret-change-me}
  TUS_ENABLED: ${TUS_ENABLED:-false}
  TUS_URL: ${TUS_URL:-http://127.0.0.1:1080/files/}
  TUS_INTERNAL_URL: http://tusd:1080/files/
  TUS_HOOK_SECRET: ${TUS_HOOK_SECRET:-dev-tus-hook-secret-change-me}
  OPENCIVIC_API_URL: http://api:8000/api/v1
  MFA_ENFORCEMENT_ENABLED: ${MFA_ENFORCEMENT_ENABLED:-false}
  EDGE_AUTH_ENABLED: ${EDGE_AUTH_ENABLED:-true}
  GATEWAY_AUTH_SECRET: ${GATEWAY_AUTH_SECRET:-dev-gateway-auth-secret-change-me}

services:
  postgres:
    image: postgres:16-alpine
    container_name: opencivic-dev-postgres
    environment:
      POSTGRES_USER: opencivic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: opencivic
    volumes:
      - opencivic_dev_postgres:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-dev.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    # No host port — avoids clashing with other local Postgres containers
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencivic -d opencivic"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [opencivic-dev]

  valkey:
    image: valkey/valkey:8-alpine
    container_name: opencivic-dev-valkey
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [opencivic-dev]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: opencivic-dev-keycloak
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    volumes:
      - ./infrastructure/docker/keycloak/realm-dev.json:/opt/keycloak/data/import/dev-realm.json:ro
    ports:
      - "${OPENCIVIC_KEYCLOAK_PORT:-8180}:8080"
      - "127.0.0.1:${OPENCIVIC_KEYCLOAK_MGMT_PORT:-8181}:9000"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks: [opencivic-dev]

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: opencivic-dev-qdrant
    volumes:
      - opencivic_dev_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [opencivic-dev]

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: opencivic-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - opencivic_dev_minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [opencivic-dev]

  clamav:
    image: clamav/clamav:1.4
    container_name: opencivic-dev-clamav
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks: [opencivic-dev]

  ollama:
    image: ollama/ollama:0.5.4
    container_name: opencivic-dev-ollama
    profiles: [ai]
    volumes:
      - opencivic_dev_ollama:/root/.ollama
    ports:
      - "127.0.0.1:${OPENCIVIC_OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [opencivic-dev]

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: opencivic-dev-api
    environment:
      <<: *api-environment
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    ports:
      # Bind IPv4 loopback only — avoids broken [::1] wslrelay on Windows Docker Desktop
      - "127.0.0.1:${OPENCIVIC_API_PORT:-8100}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [opencivic-dev]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: opencivic-dev-worker
    command: >
      celery -A app.workers.celery_app.celery_app worker
      -Q critical,ingest,refresh,ai,notifications,maintenance -l info
    environment:
      <<: *api-environment
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.workers.celery_app.celery_app inspect ping -d celery@$$HOSTNAME | grep -q OK",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks: [opencivic-dev]

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: opencivic-dev-beat
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    environment:
      <<: *api-environment
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      worker:
        condition: service_healthy
    networks: [opencivic-dev]

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: opencivic-dev-flower
    command: celery -A app.workers.celery_app.celery_app flower --port=5555
    environment:
      <<: *api-environment
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:${OPENCIVIC_FLOWER_PORT:-5555}:5555"
    depends_on:
      worker:
        condition: service_healthy
    networks: [opencivic-dev]

  tusd:
    image: tusproject/tusd:v2.4.0
    container_name: opencivic-dev-tusd
    profiles: [tus]
    command:
      - -host=0.0.0.0
      - -port=1080
      - -upload-dir=/data
      - -hooks-enabled-events=post-finish
      - -hooks-http=http://api:8000/api/v1/internal/tus-hook
      - -hooks-http-retry=3
      - -hooks-http-backoff=1s
      - -hooks-http-static-headers=X-Tus-Hook-Secret:${TUS_HOOK_SECRET:-dev-tus-hook-secret-change-me}
    volumes:
      - opencivic_dev_tus:/data
    ports:
      - "127.0.0.1:1080:1080"
    depends_on:
      api:
        condition: service_healthy
    networks: [opencivic-dev]

  apisix:
    build:
      context: ./infrastructure/apisix
      dockerfile: Dockerfile
    image: opencivic-apisix:dev
    container_name: opencivic-dev-apisix
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "127.0.0.1:${OPENCIVIC_APISIX_PORT:-9080}:9080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9080 && printf \"GET /api/v1/health/live HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [opencivic-dev]

  nginx:
    image: nginx:1.26-alpine
    container_name: opencivic-dev-nginx
    ports:
      - "127.0.0.1:${OPENCIVIC_GATEWAY_PORT:-8088}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d/opencivic-dev.conf:/etc/nginx/conf.d/opencivic.conf:ro
    depends_on:
      apisix:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [opencivic-dev]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: opencivic-dev-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:${OPENCIVIC_GATEWAY_PORT:-8088}/api/v1
      OPENCIVIC_API_URL: http://nginx:80/api/v1
      OPENCIVIC_DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-local-token-change-me}
      OPENCIVIC_STEWARD_AUTH_TOKEN: ${DEV_STEWARD_AUTH_TOKEN:-dev-steward-token-change-me}
      OPENCIVIC_ADMIN_AUTH_TOKEN: ${DEV_ADMIN_AUTH_TOKEN:-dev-admin-token-change-me}
      OPENCIVIC_DEVELOPER_AUTH_TOKEN: ${DEV_DEVELOPER_AUTH_TOKEN:-dev-developer-token-change-me}
      NEXT_PUBLIC_DEV_AUTH_TOKEN: ${DEV_AUTH_TOKEN:-dev-local-token-change-me}
      NEXT_PUBLIC_STEWARD_AUTH_TOKEN: ${DEV_STEWARD_AUTH_TOKEN:-dev-steward-token-change-me}
      NEXT_PUBLIC_ADMIN_AUTH_TOKEN: ${DEV_ADMIN_AUTH_TOKEN:-dev-admin-token-change-me}
      NEXT_PUBLIC_DEVELOPER_AUTH_TOKEN: ${DEV_DEVELOPER_AUTH_TOKEN:-dev-developer-token-change-me}
      NEXT_PUBLIC_FLOWER_URL: http://127.0.0.1:${OPENCIVIC_FLOWER_PORT:-5555}
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "127.0.0.1:${OPENCIVIC_FRONTEND_PORT:-3100}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks: [opencivic-dev]

networks:
  opencivic-dev:
    driver: bridge

volumes:
  opencivic_dev_postgres:
  opencivic_dev_minio:
  opencivic_dev_qdrant:
  opencivic_dev_ollama:
  opencivic_dev_tus:
