# CI overlay — release smoke without ClamAV wait; isolated frontend node_modules.
services:
  api:
    environment:
      CLAMAV_ENABLED: "false"

  worker:
    depends_on: !reset
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      CLAMAV_ENABLED: "false"

  beat:
    environment:
      CLAMAV_ENABLED: "false"

  clamav:
    profiles: [ci-clamav]

  keycloak:
    ports: !reset
      - "${OPENCIVIC_KEYCLOAK_PORT:-8180}:8080"
      - "127.0.0.1:${OPENCIVIC_KEYCLOAK_MGMT_PORT:-8181}:9000"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      start_period: 120s
      interval: 10s
      timeout: 10s
      retries: 36

  frontend:
    volumes: !reset
      - ./frontend:/app
      - opencivic_ci_frontend_modules:/app/node_modules
      - opencivic_ci_frontend_next:/app/.next

volumes:
  opencivic_ci_frontend_modules:
  opencivic_ci_frontend_next:
