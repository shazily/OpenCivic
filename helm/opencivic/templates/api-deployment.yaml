apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencivic.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opencivic.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opencivic.name" . }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DEPLOYMENT_MODE
              value: {{ .Values.env.deploymentMode | quote }}
            - name: DATABASE_URL
              value: {{ include "opencivic.databaseUrl" . | quote }}
            - name: VALKEY_URL
              value: {{ include "opencivic.valkeyUrl" . | quote }}
            - name: STORAGE_PROVIDER
              value: {{ .Values.env.storageProvider | quote }}
            - name: STORAGE_ENDPOINT
              value: {{ include "opencivic.storageEndpoint" . | quote }}
            - name: MINIO_ENDPOINT
              value: {{ include "opencivic.storageEndpoint" . | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.env.storageBucket | quote }}
            {{- if .Values.minio.enabled }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencivic.fullname" . }}-minio
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "opencivic.fullname" . }}-minio
                  key: secretKey
            {{- end }}
            - name: AI_MODE
              value: {{ .Values.env.aiMode | quote }}
            - name: QDRANT_URL
              value: {{ include "opencivic.qdrantUrl" . | quote }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
