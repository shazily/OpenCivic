# Enable local AI (Ollama) — use with: docker compose -f docker-compose.dev.yml -f docker-compose.ai.yml up -d
name: opencivic-dev

services:
  api:
    environment:
      AI_MODE: assist
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: llama3.2
    depends_on:
      ollama:
        condition: service_healthy

  worker:
    environment:
      AI_MODE: assist
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: llama3.2
    depends_on:
      ollama:
        condition: service_healthy

  beat:
    environment:
      AI_MODE: assist
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://ollama:11434
