apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencivic.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.frontend.type }}
  selector:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: http
      name: http
