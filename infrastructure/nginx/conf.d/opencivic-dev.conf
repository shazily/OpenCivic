server {
    listen 80 default_server;
    server_name _;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    location /api/ { proxy_pass http://apisix:9080; proxy_set_header Host $host; }
    location / { proxy_pass http://frontend:3000; proxy_set_header Host $host; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location = /health { proxy_pass http://api:8000/api/v1/health/live; access_log off; }
}
