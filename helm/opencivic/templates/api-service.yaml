apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencivic.fullname" . }}-api
  labels:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  selector:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.service.api.port }}
      targetPort: http
      name: http
