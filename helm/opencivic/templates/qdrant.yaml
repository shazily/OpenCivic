{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencivic.fullname" . }}-qdrant
  labels:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.qdrant.service.port }}
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: qdrant
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opencivic.fullname" . }}-qdrant
  labels:
    app.kubernetes.io/name: {{ include "opencivic.name" . }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "opencivic.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opencivic.name" . }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opencivic.name" . }}
        app.kubernetes.io/component: qdrant
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - containerPort: 6333
              name: http
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
